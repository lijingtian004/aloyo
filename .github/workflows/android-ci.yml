name: ALOYO CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug:
    name: 构建Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 下载NCNN Android SDK
      - name: 下载NCNN SDK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p core-inference/libs
          gh release download 20260113 --repo Tencent/ncnn --pattern "ncnn-20260113-android-vulkan.zip" --dir /tmp --clobber
          unzip -o /tmp/ncnn-20260113-android-vulkan.zip -d /tmp/ncnn
          NCNN_DIR=$(ls /tmp/ncnn/ | head -1)
          echo "NCNN directory: $NCNN_DIR"
          cp -r /tmp/ncnn/$NCNN_DIR core-inference/libs/ncnn-android-vulkan
          echo "NCNN SDK downloaded and extracted"
          ls -la core-inference/libs/ncnn-android-vulkan/

      # 设置Gradle
      - name: 设置Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: 构建Debug APK
        run: |
          set -o pipefail
          gradle assembleDebug --stacktrace --info 2>&1 | tee build-output.log

      - name: 列出构建输出
        if: always()
        run: |
          echo "=== APK files ==="
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK files found"
          echo "=== Build output directory ==="
          ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs directory"

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-output.log

      - name: 上传Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aloyo-debug-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/**/*.apk

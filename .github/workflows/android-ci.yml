name: ALOYO CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug:
    name: 构建Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 缓存Gradle包
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 下载NCNN Android SDK
      - name: 下载NCNN SDK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p core-inference/libs
          gh release download 20260113 --repo Tencent/ncnn --pattern "ncnn-20260113-android-vulkan.zip" --dir /tmp --clobber
          unzip -o /tmp/ncnn-20260113-android-vulkan.zip -d /tmp/ncnn
          NCNN_DIR=$(ls /tmp/ncnn/ | head -1)
          echo "NCNN directory: $NCNN_DIR"
          cp -r /tmp/ncnn/$NCNN_DIR core-inference/libs/ncnn-android-vulkan
          echo "NCNN SDK downloaded and extracted"
          ls -la core-inference/libs/ncnn-android-vulkan/

      # 生成gradle-wrapper.jar（仓库中不含此文件）
      - name: 生成Gradle Wrapper
        run: |
          GRADLE_VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | sed 's/.*gradle-\([0-9.]*\)-.*/\1/')
          echo "Gradle version: $GRADLE_VERSION"
          curl -L "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION}
          echo "Wrapper generated:"
          ls -la gradle/wrapper/

      - name: 授予执行权限
        run: chmod +x gradlew

      - name: 构建Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build-output.log

      - name: 列出构建输出
        if: always()
        run: |
          echo "=== APK files ==="
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK files found"
          echo "=== Build output directory ==="
          ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs directory"

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-output.log

      - name: 上传Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aloyo-debug-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/**/*.apk

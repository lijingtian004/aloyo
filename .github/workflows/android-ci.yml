name: ALOYO CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug:
    name: 构建Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 缓存Gradle依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 下载NCNN Android SDK
      - name: 下载NCNN SDK
        run: |
          mkdir -p core-inference/libs
          # 使用curl -L跟随重定向下载NCNN
          curl -L -o /tmp/ncnn.zip "https://github.com/Tencent/ncnn/releases/download/20260113/ncnn-android-vulkan.zip"
          # 验证文件下载成功
          if [ ! -f /tmp/ncnn.zip ] || [ ! -s /tmp/ncnn.zip ]; then
            echo "ERROR: NCNN download failed, trying alternative URL..."
            # 尝试旧版本URL
            curl -L -o /tmp/ncnn.zip "https://github.com/nihui/ncnn/releases/download/20240102/ncnn-20240102-android-vulkan.zip"
          fi
          unzip -o /tmp/ncnn.zip -d /tmp/ncnn
          # 查找解压后的目录名
          NCNN_DIR=$(ls /tmp/ncnn/ | head -1)
          echo "NCNN directory: $NCNN_DIR"
          # 将NCNN SDK目录复制到jni依赖路径
          cp -r /tmp/ncnn/$NCNN_DIR core-inference/libs/ncnn-android-vulkan
          echo "NCNN SDK downloaded and extracted"
          ls -la core-inference/libs/ncnn-android-vulkan/

      # 创建NCNN AAR包
      - name: 创建NCNN AAR
        run: |
          mkdir -p /tmp/ncnn-aar/jni
          # 复制各ABI的so库
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            if [ -d "core-inference/libs/ncnn-android-vulkan/$abi" ]; then
              mkdir -p /tmp/ncnn-aar/jni/$abi
              cp core-inference/libs/ncnn-android-vulkan/$abi/lib/libncnn.so /tmp/ncnn-aar/jni/$abi/ 2>/dev/null || true
            fi
          done
          # 创建AndroidManifest.xml
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.tencent.ncnn"/>' > /tmp/ncnn-aar/AndroidManifest.xml
          # 创建空的classes.jar
          mkdir -p /tmp/ncnn-aar/build
          jar cf /tmp/ncnn-aar/classes.jar -C /tmp/ncnn-aar/build . 2>/dev/null || true
          # 打包AAR
          cd /tmp/ncnn-aar
          zip -r $GITHUB_WORKSPACE/core-inference/libs/ncnn-android.aar AndroidManifest.xml classes.jar jni/
          echo "NCNN AAR created"
          ls -la $GITHUB_WORKSPACE/core-inference/libs/

      - name: 授予执行权限
        run: chmod +x gradlew

      - name: 构建Debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: '**/build/logs/'

      - name: 上传Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aloyo-debug-apk
          path: app/build/outputs/apk/debug/*.apk

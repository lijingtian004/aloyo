name: ALOYO CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug:
    name: жһ„е»әDebug APK
    runs-on: ubuntu-latest
    steps:
      - name: жЈҖеҮәд»Јз Ғ
        uses: actions/checkout@v4

      - name: и®ҫзҪ®JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: зј“еӯҳGradleдҫқиө–
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # дёӢиҪҪNCNN Android SDK - дҪҝз”Ёgh CLI
      - name: дёӢиҪҪNCNN SDK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p core-inference/libs
          # дҪҝз”Ёgh release downloadд»ҺTencent/ncnnдёӢиҪҪ
          gh release download 20260113 --repo Tencent/ncnn --pattern "ncnn-20260113-android-vulkan.zip" --dir /tmp --clobber
          # и§ЈеҺӢ
          unzip -o /tmp/ncnn-20260113-android-vulkan.zip -d /tmp/ncnn
          # жҹҘжүҫи§ЈеҺӢеҗҺзҡ„зӣ®еҪ•еҗҚ
          NCNN_DIR=$(ls /tmp/ncnn/ | head -1)
          echo "NCNN directory: $NCNN_DIR"
          # е°ҶNCNN SDKзӣ®еҪ•еӨҚеҲ¶еҲ°jniдҫқиө–и·Ҝеҫ„
          cp -r /tmp/ncnn/$NCNN_DIR core-inference/libs/ncnn-android-vulkan
          echo "NCNN SDK downloaded and extracted"
          ls -la core-inference/libs/ncnn-android-vulkan/

      # еҲӣе»әNCNN AARеҢ…
      - name: еҲӣе»әNCNN AAR
        run: |
          mkdir -p /tmp/ncnn-aar/jni
          # еӨҚеҲ¶еҗ„ABIзҡ„soеә“
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            if [ -d "core-inference/libs/ncnn-android-vulkan/$abi" ]; then
              mkdir -p /tmp/ncnn-aar/jni/$abi
              cp core-inference/libs/ncnn-android-vulkan/$abi/lib/libncnn.so /tmp/ncnn-aar/jni/$abi/ 2>/dev/null || true
            fi
          done
          # еҲӣе»әAndroidManifest.xml
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.tencent.ncnn"/>' > /tmp/ncnn-aar/AndroidManifest.xml
          # еҲӣе»әз©әзҡ„classes.jar
          mkdir -p /tmp/ncnn-aar/build
          jar cf /tmp/ncnn-aar/classes.jar -C /tmp/ncnn-aar/build . 2>/dev/null || true
          # жү“еҢ…AAR
          cd /tmp/ncnn-aar
          zip -r $GITHUB_WORKSPACE/core-inference/libs/ncnn-android.aar AndroidManifest.xml classes.jar jni/
          echo "NCNN AAR created"
          ls -la $GITHUB_WORKSPACE/core-inference/libs/

      - name: жҺҲдәҲжү§иЎҢжқғйҷҗ
        run: chmod +x gradlew

      - name: е®үиЈ…CMakeе’ҢNDK
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1" "ndk;27.0.12077973"

      - name: дёӢиҪҪGradle Wrapper JAR
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -L -o gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/nihui/ncnn-android-yolov8/master/gradle/wrapper/gradle-wrapper.jar" 2>/dev/null || \
            curl -L -o gradle/wrapper/gradle-wrapper.jar "https://github.com/nihui/ncnn-android-yolov8/raw/master/gradle/wrapper/gradle-wrapper.jar" 2>/dev/null || \
            wget -q -O gradle/wrapper/gradle-wrapper.jar "https://services.gradle.org/distributions/gradle-8.5-bin.zip" 2>/dev/null
            # еҰӮжһңиҝҳжҳҜеӨұиҙҘпјҢдҪҝз”Ёgradle wrapperе‘Ҫд»Ө
            if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
              echo "Using system gradle to generate wrapper..."
              which gradle && gradle wrapper --gradle-version 8.5 || {
                echo "Downloading wrapper jar directly from Gradle distributions..."
                mkdir -p /tmp/gradle-download
                curl -L "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle-download/gradle.zip
                unzip -q /tmp/gradle-download/gradle.zip -d /tmp/gradle-download
                /tmp/gradle-download/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
              }
            fi
          fi
          ls -la gradle/wrapper/

      - name: жһ„е»әDebug APK
        run: ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build-output.log

      - name: дёҠдј жһ„е»әж—Ҙеҝ—
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-output.log

      - name: дёҠдј Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aloyo-debug-apk
          path: app/build/outputs/apk/debug/*.apk
